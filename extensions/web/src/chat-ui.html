<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandra</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #1a1a2e; color: white; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
  #header h1 { font-size: 1.1rem; font-weight: 600; }
  #status { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  #status.connected { background: #4caf50; }
  #status.connecting { background: #ff9800; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  #messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .msg { max-width: 72%; display: flex; flex-direction: column; gap: 0.25rem; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .bubble { padding: 0.625rem 0.875rem; border-radius: 16px; line-height: 1.5; font-size: 0.9375rem; white-space: pre-wrap; word-break: break-word; }
  .msg.user .bubble { background: #1a1a2e; color: white; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: white; color: #1a1a2e; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 0.75rem; }
  .typing-indicator span { width: 6px; height: 6px; background: #999; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  #input-area { background: white; border-top: 1px solid #e0e0e0; padding: 1rem 1.5rem; display: flex; gap: 0.75rem; align-items: flex-end; }
  #message-input { flex: 1; resize: none; border: 1px solid #ddd; border-radius: 24px; padding: 0.625rem 1rem; font-size: 0.9375rem; font-family: inherit; outline: none; line-height: 1.4; max-height: 120px; overflow-y: auto; }
  #message-input:focus { border-color: #1a1a2e; }
  #send-btn { background: #1a1a2e; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; }
  #auth-screen { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 2rem; }
  #auth-screen h2 { font-size: 1.25rem; color: #1a1a2e; }
  #auth-screen p { color: #666; font-size: 0.875rem; }
  #auth-screen input { border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem 1rem; font-size: 1rem; width: 100%; max-width: 320px; outline: none; }
  #auth-screen input:focus { border-color: #1a1a2e; }
  #auth-screen button { background: #1a1a2e; color: white; border: none; border-radius: 8px; padding: 0.75rem 2rem; font-size: 1rem; cursor: pointer; width: 100%; max-width: 320px; }
  #chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="header">
  <div id="status" class="connecting"></div>
  <h1>Sandra</h1>
</div>
<div id="auth-screen">
  <h2>Sign in to Sandra</h2>
  <p>Enter your user ID to continue</p>
  <input type="text" id="token-input" placeholder="User ID" autocomplete="off">
  <button id="connect-btn">Connect</button>
</div>
<div id="chat-view" class="hidden">
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="message-input" rows="1" placeholder="Message Sandra..." disabled></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>
<script>
var ws = null;
var typingEl = null;
var streamingEl = null;

var statusEl = document.getElementById('status');
var authScreen = document.getElementById('auth-screen');
var chatView = document.getElementById('chat-view');
var messagesEl = document.getElementById('messages');
var inputEl = document.getElementById('message-input');
var sendBtn = document.getElementById('send-btn');
var tokenInput = document.getElementById('token-input');
var connectBtn = document.getElementById('connect-btn');

function connect(token) {
  statusEl.className = 'connecting';
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/chat/ws?token=' + encodeURIComponent(token));

  ws.onmessage = function(event) {
    try {
      handleServerMessage(JSON.parse(event.data));
    } catch (_e) {
      // ignore malformed frames
    }
  };

  ws.onclose = function(e) {
    statusEl.className = '';
    inputEl.disabled = true;
    sendBtn.disabled = true;
    if (e.code === 1008) {
      authScreen.classList.remove('hidden');
      chatView.classList.add('hidden');
      alert('Authentication failed. Check your user ID.');
    } else if (!chatView.classList.contains('hidden')) {
      appendMessage('assistant', '(Connection closed. Refresh to reconnect.)');
    }
  };

  ws.onerror = function() {
    statusEl.className = '';
  };
}

function handleServerMessage(msg) {
  switch (msg.type) {
    case 'connected':
      statusEl.className = 'connected';
      authScreen.classList.add('hidden');
      chatView.classList.remove('hidden');
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
      break;

    case 'typing':
      showTyping();
      break;

    case 'chunk':
      hideTyping();
      appendChunk(msg.text || '');
      break;

    case 'message_done':
      finaliseStream();
      reenableInput();
      break;

    case 'message':
      hideTyping();
      finaliseStream();
      appendMessage('assistant', msg.text || '');
      reenableInput();
      break;

    case 'error':
      hideTyping();
      finaliseStream();
      appendMessage('assistant', 'Error: ' + (msg.text || 'Something went wrong.'));
      reenableInput();
      break;
  }
}

function appendMessage(role, text) {
  var msgEl = document.createElement('div');
  msgEl.className = 'msg ' + role;
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msgEl.appendChild(bubble);
  messagesEl.appendChild(msgEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'msg assistant';
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  var indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  for (var i = 0; i < 3; i++) {
    var dot = document.createElement('span');
    indicator.appendChild(dot);
  }
  bubble.appendChild(indicator);
  typingEl.appendChild(bubble);
  messagesEl.appendChild(typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  if (typingEl) {
    typingEl.remove();
    typingEl = null;
  }
}

function appendChunk(chunk) {
  if (!streamingEl) {
    streamingEl = document.createElement('div');
    streamingEl.className = 'msg assistant';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    streamingEl.appendChild(bubble);
    messagesEl.appendChild(streamingEl);
  }
  var b = streamingEl.querySelector('.bubble');
  b.textContent = (b.textContent || '') + chunk;
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function finaliseStream() {
  streamingEl = null;
}

function reenableInput() {
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function sendMessage() {
  var text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  appendMessage('user', text);
  ws.send(JSON.stringify({ text: text }));
  inputEl.value = '';
  inputEl.style.height = 'auto';
  inputEl.disabled = true;
  sendBtn.disabled = true;
}

connectBtn.addEventListener('click', function() {
  var token = tokenInput.value.trim();
  if (token) connect(token);
});

tokenInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') connectBtn.click();
});

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('input', function() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

sendBtn.addEventListener('click', sendMessage);

// Auto-connect if token supplied in URL params
var params = new URLSearchParams(location.search);
var urlToken = params.get('token');
if (urlToken) connect(urlToken);
</script>
</body>
</html>
