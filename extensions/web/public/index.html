<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandra</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex;
           flex-direction: column; }
    #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex;
            flex-direction: column; gap: 12px; }
    .msg { max-width: 72%; padding: 10px 14px; border-radius: 18px; line-height: 1.5;
           white-space: pre-wrap; word-break: break-word; }
    .user { align-self: flex-end; background: #1a6cf5; color: #fff; border-radius: 18px 18px 4px 18px; }
    .assistant { align-self: flex-start; background: #2a2a2a; border-radius: 18px 18px 18px 4px; }
    .typing { align-self: flex-start; color: #666; font-style: italic; font-size: 13px; }
    #form { display: flex; gap: 8px; padding: 12px 16px; background: #1a1a1a;
            border-top: 1px solid #222; }
    #input { flex: 1; padding: 10px 14px; border-radius: 24px; border: 1px solid #333;
             background: #2a2a2a; color: #e0e0e0; font-size: 15px; outline: none; resize: none; }
    #send { padding: 10px 20px; background: #1a6cf5; color: white; border: none;
            border-radius: 24px; cursor: pointer; font-size: 15px; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 12px; color: #555; padding: 4px 16px; }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <div id="chat"></div>
  <form id="form">
    <textarea id="input" placeholder="Message Sandra..." rows="1"></textarea>
    <button id="send" type="submit">Send</button>
  </form>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') ?? '';
    const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws${token ? '?token=' + encodeURIComponent(token) : ''}`;
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');

    let ws;

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => { statusEl.textContent = 'Connected'; };
      ws.onclose = () => {
        statusEl.textContent = 'Disconnected - reconnecting...';
        setTimeout(connect, 3000);
      };
      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'connected') return;
        if (msg.type === 'typing') {
          addMsg('typing', '...');
          return;
        }
        removeTyping();
        if (msg.type === 'message' && msg.text) addMsg('assistant', msg.text);
        if (msg.type === 'error') addMsg('assistant', '! ' + msg.text);
      };
    }

    function addMsg(role, text) {
      removeTyping();
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = chat.querySelector('.typing');
      if (t) t.remove();
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      addMsg('user', text);
      ws.send(JSON.stringify({ text }));
      input.value = '';
      sendBtn.disabled = true;
      setTimeout(() => { sendBtn.disabled = false; }, 500);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });

    connect();
  </script>
</body>
</html>
